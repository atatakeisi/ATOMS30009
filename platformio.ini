[env:m5stack-atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<*> -<servo_test.cpp>
lib_deps =
  m5stack/M5Unified
  https://github.com/TKJElectronics/KalmanFilter.git

