; 全環境共通の設定（各 env が継承する）
[env]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  m5stack/M5Unified
  https://github.com/TKJElectronics/KalmanFilter.git

; 本番ファーム（現行 main.cpp）。teach/ と servo_test.cpp は除外。
[env:m5stack-atoms3]
build_src_filter = +<*> -<servo_test.cpp> -<teach/>

; Teaching / 計測再生ファーム。src/teach/ のみをビルド。
[env:m5stack-atoms3-teach]
build_src_filter = -<*> +<teach/>

; [env:servo_test]
; build_src_filter = -<*> +<servo_test.cpp>
