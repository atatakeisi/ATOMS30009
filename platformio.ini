; 全環境共通の設定（各 env が継承する）
[env]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  m5stack/M5Unified
  https://github.com/TKJElectronics/KalmanFilter.git

; 本番（筐体専用）ファーム。src/prod/ のみをビルド。
; motions/*.h はヘッダなのでビルド対象外（prod から相対includeで取り込む）。
[env:m5stack-atoms3]
build_src_filter = +<prod/>

; Teaching（工房）ファーム。src/teach/ のみをビルド。
[env:m5stack-atoms3-teach]
build_src_filter = +<teach/>

; サーボ単体テストは tools/servo-test/ に退避（このプロジェクトではビルドしない）。
